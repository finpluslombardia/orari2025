<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orari Piscina Lampugnano - Festa della Donna</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary-color: #6b21a8; 
      --accent-color: #facc15;  
      --bg-color: #fffef0;      
      --header-height: 220px; 
      --footer-height: 80px;
      --mimosa-yellow-bright: #fef08a;
      --mimosa-yellow-dark: #eab308;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--primary-color);
      letter-spacing: -0.5px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ====== HEADER CON LOGO E MIMOSA SOVRAPPOSTA ====== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ffffff;
      padding: 0 40px; 
      box-shadow: 0 4px 20px rgba(107, 33, 168, 0.1);
      height: var(--header-height);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      border-bottom: 5px solid var(--accent-color);
    }
    
    .logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
    }

    header img {
      height: 75%; 
      width: auto;
      object-fit: contain;
      z-index: 1;
    }
    
    /* Mimosa attaccata e parzialmente sovrapposta al logo */
    .mimosa-header {
      height: 90%; 
      width: auto;
      position: absolute;
      left: 200px; /* Regolato per sovrapporsi alla fine del logo blu */
      z-index: 2;
      filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1));
      pointer-events: none;
    }

    .datetime { text-align: right; line-height: 1; z-index: 3; }
    
    .datetime .time { 
        font-weight: 800; 
        font-size: 110px; 
        letter-spacing: -4px; 
        color: var(--primary-color);
        text-shadow: 2px 2px 0px var(--accent-color);
    }
    
    .datetime .date { 
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-weight: 700; 
        font-size: 40px; 
        color: #8b5cf6; 
        text-transform: capitalize; 
        margin-top: 5px;
    }

    /* ====== CONTENUTO ====== */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin-top: var(--header-height);
      margin-bottom: var(--footer-height);
      overflow-y: hidden;
      position: relative;
    }

    #courses {
      width: 100%;
      max-width: 1700px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 25px; 
    }

    /* ====== CORSI ====== */
    .course {
      display: flex;
      border-radius: 24px; 
      overflow: hidden;
      background-color: #fff;
      box-shadow: 0 10px 25px rgba(107, 33, 168, 0.08);
      width: 100%;
      position: relative;
      border: 2px solid transparent;
    }
    
    .course > div {
      padding: 25px 35px; 
      display: flex;
      align-items: center;
    }
    .course .attivita {
      flex: 2;
      font-size: 55px; 
      font-weight: 800;
      color: var(--primary-color);
    }
    .course .dettagli {
      flex: 1.2;
      display: flex;
      justify-content: space-around;
      background-color: rgba(250, 204, 21, 0.03);
      border-left: 2px dashed rgba(107, 33, 168, 0.1);
    }
    .info-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .info-label { font-size: 20px; text-transform: uppercase; color: #7e22ce; font-weight: 700; margin-bottom: 5px; opacity: 0.7; }
    .info-time { font-size: 60px; font-weight: 800; color: #1e1b4b; line-height: 1; }

    .green  { background: linear-gradient(90deg, #f0fdf4 0%, #ffffff 100%); border-left: 25px solid #22c55e; border-right: 4px solid #22c55e; }
    .yellow { 
      background: linear-gradient(90deg, #fefce8 0%, #ffffff 100%); 
      border-left: 25px solid var(--accent-color);
      border-right: 4px solid var(--accent-color);
      animation: pulse-glow 2s infinite;
    }
    .gray   { background-color: #fcfcfc; border-left: 25px solid #cbd5e1; color: #94a3b8; filter: grayscale(0.5); }

    @keyframes pulse-glow {
      0% { transform: scale(1); }
      50% { transform: scale(1.005); }
      100% { transform: scale(1); }
    }

    .empty-message {
      text-align: center;
      font-size: 50px;
      font-weight: 700;
      color: var(--primary-color);
      background: white;
      padding: 60px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(107, 33, 168, 0.15);
      border: 3px solid var(--accent-color);
    }

    /* ====== FOOTER TICKER ====== */
    footer {
      background: var(--primary-color);
      color: var(--accent-color);
      height: var(--footer-height);
      overflow: hidden;
      display: flex;
      align-items: center;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      border-top: 4px solid var(--accent-color);
    }
    .ticker {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      white-space: nowrap;
      display: flex;
      align-items: center;
    }
    .ticker__track {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      animation: ticker var(--ticker-duration, 20s) linear infinite;
    }
    .ticker__content {
      display: inline-block;
      padding-right: 100px;
      font-size: 42px;
      font-weight: 700;
      line-height: var(--footer-height);
      text-transform: uppercase;
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <!-- Definizione Cluster Mimosa Riutilizzabile -->
  <svg style="display: none;">
    <symbol id="mimosa-cluster" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="5" fill="#facc15" />
        <circle cx="15" cy="15" r="4.5" fill="#fde047" />
        <circle cx="25" cy="15" r="4" fill="#fbbf24" />
        <circle cx="20" cy="12" r="3.5" fill="#fef08a" />
        <circle cx="12" cy="22" r="4" fill="#fbbf24" />
        <circle cx="28" cy="22" r="4.5" fill="#fde047" />
        <circle cx="18" cy="28" r="4" fill="#facc15" />
        <circle cx="24" cy="27" r="3.5" fill="#eab308" />
    </symbol>
    <symbol id="mimosa-leaf" viewBox="0 0 100 40">
        <path d="M0 20 Q50 15 100 20" stroke="#365314" stroke-width="1.5" fill="none" />
        <g stroke="#4d7c0f" stroke-width="1">
            <line x1="10" y1="20" x2="5" y2="10" /> <line x1="10" y1="20" x2="5" y2="30" />
            <line x1="25" y1="19" x2="20" y2="8" /> <line x1="25" y1="19" x2="20" y2="32" />
            <line x1="40" y1="18" x2="35" y2="6" /> <line x1="40" y1="18" x2="35" y2="34" />
            <line x1="55" y1="18" x2="50" y2="6" /> <line x1="55" y1="18" x2="50" y2="34" />
            <line x1="70" y1="19" x2="65" y2="8" /> <line x1="70" y1="19" x2="65" y2="32" />
        </g>
    </symbol>
  </svg>

  <header>
    <div class="logo-wrapper">
        <img src="CF Lampugnano blu xl.png" alt="Logo Piscina" onerror="this.style.display='none'; document.write('<h2 style=\'font-family:Playfair Display; color:#003366\'>Piscina Lampugnano</h2>')"/>
        
        <!-- Ramo di Mimosa Realistico sovrapposto al logo -->
        <svg class="mimosa-header" viewBox="0 0 120 200">
            <path d="M40 190 Q50 100 45 10" stroke="#365314" stroke-width="3" fill="none" />
            <g transform="translate(10, 150) rotate(-30) scale(0.6)"> <use href="#mimosa-leaf" /> </g>
            <g transform="translate(60, 100) rotate(20) scale(0.7)"> <use href="#mimosa-leaf" /> </g>
            <use href="#mimosa-cluster" x="35" y="20" width="30" />
            <use href="#mimosa-cluster" x="25" y="50" width="35" />
            <use href="#mimosa-cluster" x="50" y="70" width="25" />
            <use href="#mimosa-cluster" x="20" y="90" width="40" />
            <use href="#mimosa-cluster" x="45" y="120" width="30" />
            <use href="#mimosa-cluster" x="30" y="150" width="35" />
        </svg>
    </div>

    <div class="datetime">
      <div class="time" id="clock">--:--</div>
      <div class="date" id="date">--</div>
    </div>
  </header>

  <div class="container">
    <div id="courses">
        <div class="empty-message">Caricamento corsi in corso... 🌸</div>
    </div>
  </div>

  <footer>
    <div class="ticker" id="ticker">
      <div class="ticker__track" id="ticker-track">
        <span class="ticker__content" id="ticker-copy-1">...</span>
        <span class="ticker__content" id="ticker-copy-2">...</span>
      </div>
    </div>
  </footer>

  <script>
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const options = { weekday: 'long', day: '2-digit', month: 'long' };
      document.getElementById("clock").textContent = `${h}:${m}`;
      document.getElementById("date").textContent  = now.toLocaleDateString('it-IT', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    function normalizeStr(str) {
      if (!str) return "";
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function parseTime(t) {
      if (!t || typeof t !== 'string' || !t.includes(':')) return NaN;
      const [h, m] = t.split(":").map(Number);
      return (h * 60) + m;
    }

    function formatCell(cell) {
      if (!cell) return "";
      if (cell.f) return cell.f;
      return cell.v ? cell.v.toString() : "";
    }

    async function loadAll() {
      const SHEET_ID = '1dcs1X7x84g69f14m9Sl2KmqZUbCI6lLBBfi3QCMNqWI';
      const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;
      
      try {
        const resC = await fetch(SHEET_BASE + 'Corsi');
        const txtC = await resC.text();
        const jsonC = JSON.parse(txtC.substring(47).slice(0, -2));
        const rowsC = jsonC.table.rows.map(r => r.c.map(c => c ? formatCell(c) : ""));

        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const todayName = normalizeStr(now.toLocaleDateString('it-IT', { weekday: 'long' }));

        let parsed = rowsC
          .filter(r => normalizeStr(r[0]) === todayName)
          .map(r => ({
              attivita: r[1] || '',
              oraIngresso: r[2] || '',
              oraInizio: r[3] || '',
              durata: Number.parseInt(r[4]) || 60,
              ingressoMin: parseTime(r[2]),
              inizioMin: parseTime(r[3])
          }))
          .filter(c => Number.isFinite(c.ingressoMin) && currentTime <= (c.ingressoMin + c.durata))
          .sort((a, b) => a.ingressoMin - b.ingressoMin);

        renderCourses(parsed, currentTime);

        const resN = await fetch(SHEET_BASE + 'Note');
        const txtN = await resN.text();
        const jsonN = JSON.parse(txtN.substring(47).slice(0, -2));
        const rowsN = jsonN.table.rows.map(r => r.c.map(c => c ? formatCell(c) : ""));
        
        let notesText = rowsN.filter(r => r[0] && r[0].trim() !== '').map(r => r[0]).join("  •  ");
        notesText = notesText ? "🌸 AUGURI A TUTTE LE DONNE! 🌸  •  " + notesText : "Buona Festa della Donna a tutte le nostre corsiste! 🌸 Auguri da tutto lo staff della Piscina Lampugnano! 🌸";
        updateTicker(notesText);

      } catch (err) {
        console.error('Errore database:', err);
      }
    }

    function renderCourses(courses, currentTime) {
        const coursesBox = document.getElementById('courses');
        let htmlContent = '';

        if (courses.length === 0) {
           htmlContent = `<div class="empty-message">🌸 Le attività di oggi sono terminate.<br><span style="font-size:30px; color:#7e22ce; font-weight: 500;">Buona serata a tutte!</span></div>`;
        } else {
          courses.slice(0, 4).forEach(corso => {
            const timeToStart = corso.ingressoMin - currentTime;
            let style = 'gray'; 
            if (timeToStart <= 0 && timeToStart > -corso.durata) style = 'green'; 
            else if (timeToStart <= 10 && timeToStart > 0) style = 'yellow';

            htmlContent += `
              <div class="course ${style}">
                <div class="attivita">${corso.attivita}</div>
                <div class="dettagli">
                    <div class="info-box"><span class="info-label">Ingresso</span><span class="info-time">${corso.oraIngresso}</span></div>
                    <div class="info-box"><span class="info-label">Inizio</span><span class="info-time">${corso.oraInizio}</span></div>
                </div>
              </div>`;
          });
        }
        coursesBox.innerHTML = htmlContent;
    }

    function updateTicker(text) {
        const copy1 = document.getElementById('ticker-copy-1');
        const copy2 = document.getElementById('ticker-copy-2');
        if (copy1.textContent === text) return;
        copy1.textContent = text;
        copy2.textContent = text;
        requestAnimationFrame(() => {
            const duration = copy1.offsetWidth / 130; 
            document.getElementById('ticker-track').style.setProperty('--ticker-duration', `${duration}s`);
        });
    }

    loadAll();
    setInterval(loadAll, 30000); 
  </script>
</body>
</html>
