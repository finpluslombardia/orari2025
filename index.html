<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Orari Piscina Lampugnano - Pasqua</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Palette Pasquale */
      --primary-color: #6a1b9a; /* Viola intenso */
      --secondary-color: #ab47bc; /* Lilla */
      --bg-color: #fffaf0; /* Bianco crema caldo */
      --header-height: 220px; 
      --footer-height: 80px;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      /* Pattern primaverile molto delicato a pois */
      background-image: radial-gradient(#f3e5f5 15%, transparent 15%), radial-gradient(#f3e5f5 15%, transparent 15%);
      background-size: 40px 40px;
      background-position: 0 0, 20px 20px;
      color: var(--primary-color);
      letter-spacing: -0.5px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Decorazioni in filigrana (Easter Eggs & Bunnies) */
    body::before, body::after {
      position: absolute;
      font-size: 150px;
      opacity: 0.05; /* Molto trasparente per non disturbare la lettura */
      z-index: -1;
      pointer-events: none;
    }
    body::before {
      content: "🐰";
      bottom: 150px;
      left: 100px;
      transform: rotate(-15deg);
    }
    body::after {
      content: "🐣";
      top: 300px;
      right: 120px;
      transform: rotate(15deg);
    }

    /* ====== HEADER ====== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #ffffff;
      padding: 0 40px; 
      box-shadow: 0 4px 20px rgba(106, 27, 154, 0.15); /* Ombra colorata */
      border-bottom: 6px solid var(--secondary-color); /* Bordo lilla */
      height: var(--header-height);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
    }
    header img {
      height: 85%; 
      width: auto;
      object-fit: contain;
    }
    .datetime { text-align: right; line-height: 1; }
    
    .datetime .time { 
        font-weight: 700; 
        font-size: 110px; 
        letter-spacing: -3px; 
        color: var(--primary-color);
    }
    
    .datetime .date { 
        font-weight: 500; 
        font-size: 45px; 
        color: var(--secondary-color); 
        text-transform: capitalize; 
        margin-top: 5px;
    }

    /* ====== CONTENUTO ====== */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin-top: var(--header-height);
      margin-bottom: var(--footer-height);
      overflow-y: hidden;
    }
    #courses {
      width: 100%;
      max-width: 1700px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px; 
    }

    /* ====== CORSI ====== */
    .course {
      display: flex;
      border-radius: 20px; /* Bordi ancora più morbidi */
      overflow: hidden;
      background-color: #fff;
      box-shadow: 0 8px 15px rgba(0,0,0,0.05);
      width: 100%;
      position: relative;
      transition: all 0.3s ease;
    }
    .course > div {
      padding: 25px 35px; 
      display: flex;
      align-items: center;
    }
    .course .attivita {
      flex: 2;
      font-size: 60px; 
      font-weight: 700;
      color: var(--primary-color);
    }
    .course .dettagli {
      flex: 1.2;
      display: flex;
      justify-content: space-around;
      background-color: rgba(106, 27, 154, 0.03); /* Fondo leggermente lilla */
      border-left: 1px solid rgba(106, 27, 154, 0.1);
    }
    .info-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .info-label { font-size: 22px; text-transform: uppercase; color: #888; font-weight: 600; margin-bottom: 5px; }
    .info-time { font-size: 60px; font-weight: 700; color: #333; line-height: 1; }

    /* Colori stato - TEMA PASTELLO */
    .green  { background-color: #e8f5e9; border-left: 20px solid #66bb6a; } /* Verde menta */
    .yellow { background-color: #fffde7; border-left: 20px solid #ffee58; } /* Giallo pulcino */
    .gray   { background-color: #f3e5f5; border-left: 20px solid #ce93d8; } /* Lilla chiaro invece del grigio */
    .gray .attivita { color: #8e24aa; } /* Testo più chiaro per i corsi futuri */
    
    /* Animazione per il giallo (inizio imminente) */
    .yellow { animation: pulse-border 2s infinite; }
    @keyframes pulse-border {
      0% { border-left-color: #ffee58; }
      50% { border-left-color: #fff59d; }
      100% { border-left-color: #ffee58; }
    }

    /* Messaggio vuoto */
    .empty-message {
      text-align: center;
      font-size: 50px;
      font-weight: 600;
      color: var(--primary-color);
      background: white;
      padding: 60px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(106, 27, 154, 0.1);
      border: 3px dashed var(--secondary-color);
    }

    /* ====== FOOTER TICKER ====== */
    footer {
      background: var(--secondary-color); /* Footer lilla */
      color: white;
      height: var(--footer-height);
      overflow: hidden;
      display: flex;
      align-items: center;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
    }
    .ticker {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      white-space: nowrap;
      display: flex;
      align-items: center;
    }
    .ticker__track {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      animation: ticker var(--ticker-duration, 20s) linear infinite;
    }
    .ticker__content {
      display: inline-block;
      padding-right: 100px;
      font-size: 40px;
      font-weight: 500;
      line-height: var(--footer-height);
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <header>
    <img src="CF Lampugnano blu xl.png" alt="Logo Piscina" onerror="this.style.display='none'; document.write('<h2>Piscina Lampugnano</h2>')"/>
    <div class="datetime">
      <div class="time" id="clock">--:--</div>
      <div class="date" id="date">--</div>
    </div>
  </header>

  <div class="container">
    <div id="courses">
        <div class="empty-message">🐰 Caricamento corsi in corso... 🐣</div>
    </div>
  </div>

  <footer>
    <div class="ticker" id="ticker">
      <div class="ticker__track" id="ticker-track">
        <span class="ticker__content" id="ticker-copy-1">...</span>
        <span class="ticker__content" id="ticker-copy-2">...</span>
      </div>
    </div>
  </footer>

  <script>
    /* ====== OROLOGIO ====== */
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      
      const options = { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' };
      const dateStr = now.toLocaleDateString('it-IT', options); 
      
      document.getElementById("clock").textContent = `${h}:${m}`;
      document.getElementById("date").textContent  = dateStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ====== UTILS ====== */
    function normalizeStr(str) {
      if (!str) return "";
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function parseTime(t) {
      if (!t || typeof t !== 'string' || !t.includes(':')) return NaN;
      const [h, m] = t.split(":").map(Number);
      return (h * 60) + m;
    }

    function formatCell(cell) {
      if (!cell) return "";
      if (cell.f) return cell.f;
      if (typeof cell.v === 'string') return cell.v;
      if (typeof cell.v === 'number') return cell.v.toString();
      return "";
    }

    /* ====== CARICAMENTO DATI ====== */
    async function loadAll() {
      const SHEET_ID = '1dcs1X7x84g69f14m9Sl2KmqZUbCI6lLBBfi3QCMNqWI';
      const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;
      
      try {
        /* ---- FETCH CORSI ---- */
        const resC = await fetch(SHEET_BASE + 'Corsi');
        if (!resC.ok) throw new Error("Network response was not ok");
        const txtC = await resC.text();
        const jsonC = JSON.parse(txtC.substring(47).slice(0, -2));
        const rowsC = jsonC.table.rows.map(r => r.c.map(c => c ? formatCell(c) : ""));

        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const todayName = normalizeStr(now.toLocaleDateString('it-IT', { weekday: 'long' }));

        let parsed = rowsC
          .filter(r => normalizeStr(r[0]) === todayName)
          .map(r => {
            const ingressoMin = parseTime(r[2]);
            const inizioMin   = parseTime(r[3]);
            const durata      = Number.parseInt(r[4]) || 60;
            return {
              attivita: r[1] || '',
              oraIngresso: r[2] || '',
              oraInizio: r[3] || '',
              durata,
              ingressoMin,
              inizioMin
            };
          })
          .filter(c => Number.isFinite(c.ingressoMin) && currentTime <= (c.ingressoMin + c.durata))
          .sort((a, b) => a.ingressoMin - b.ingressoMin);

        renderCourses(parsed, currentTime);

        /* ---- FETCH NOTE ---- */
        const resN = await fetch(SHEET_BASE + 'Note');
        const txtN = await resN.text();
        const jsonN = JSON.parse(txtN.substring(47).slice(0, -2));
        const rowsN = jsonN.table.rows.map(r => r.c.map(c => c ? formatCell(c) : ""));
        const notesText = rowsN
          .filter(r => r[0] && r[0].trim() !== '')
          .map(r => r[0])
          .join("  •  ");

        // Aggiungiamo un tocco pasquale di default alle note se non ce ne sono
        updateTicker(notesText || '🌸 Benvenuti alla Piscina Lampugnano • Vi auguriamo una serena Pasqua! 🌸');

      } catch (err) {
        console.error('Errore update:', err);
        const box = document.getElementById('courses');
        if (!box.children.length || box.innerText.includes('Caricamento')) {
           box.innerHTML = `<div class="empty-message">⚠️ Riconnessione in corso...</div>`;
        }
      }
    }

    function renderCourses(courses, currentTime) {
        const coursesBox = document.getElementById('courses');
        let htmlContent = '';

        if (courses.length === 0) {
           htmlContent = `
            <div class="empty-message">
              🐰 Le attività di oggi sono terminate.<br>
              <span style="font-size:30px; color:var(--secondary-color); display:block; margin-top:15px;">
                Vi aspettiamo domani! Buona Pasqua! 🐣
              </span>
            </div>`;
        } else {
          const visible = courses.slice(0, 4); 
          
          visible.forEach(corso => {
            const timeToStart = corso.ingressoMin - currentTime;
            
            let style = 'gray'; 
            if (timeToStart <= 0 && timeToStart > -corso.durata) {
                style = 'green'; 
            } else if (timeToStart <= 5 && timeToStart > 0) {
                style = 'yellow';
            }

            htmlContent += `
              <div class="course ${style}">
                <div class="attivita">${corso.attivita}</div>
                <div class="dettagli">
                    <div class="info-box">
                        <span class="info-label">Ingresso</span>
                        <span class="info-time">${corso.oraIngresso}</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Inizio</span>
                        <span class="info-time">${corso.oraInizio}</span>
                    </div>
                </div>
              </div>
            `;
          });
        }
        coursesBox.innerHTML = htmlContent;
    }

    function updateTicker(text) {
        const copy1 = document.getElementById('ticker-copy-1');
        const copy2 = document.getElementById('ticker-copy-2');
        const track = document.getElementById('ticker-track');
        
        if (copy1.textContent === text) return;

        copy1.textContent = text;
        copy2.textContent = text;

        requestAnimationFrame(() => {
            const width = copy1.offsetWidth;
            const speed = 200; // Velocità elevata
            const duration = width / speed; 
            track.style.setProperty('--ticker-duration', `${duration}s`);
        });
    }

    loadAll();
    setInterval(loadAll, 30000); 
  </script>
</body>
</html>
