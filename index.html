<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Orari Piscina Lampugnano - Speciale Sanremo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* COLORI TEMA SANREMO ESTREMO */
      --sanremo-gold: #FFD700;
      --sanremo-gold-glow: #FFAA00;
      --sanremo-red: #E60000;
      --sanremo-red-dark: #660000;
      --sanremo-night: #050814;
      --sanremo-stage: #0F1B3D;
      
      --header-height: 220px; 
      --footer-height: 80px;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at 50% 10%, var(--sanremo-stage), var(--sanremo-night) 90%);
      color: white;
      letter-spacing: -0.5px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ====== FARI DA PALCOSCENICO (ANIMATI) ====== */
    body::before, body::after {
      content: '';
      position: absolute;
      top: -10vh;
      width: 40vw;
      height: 150vh;
      background: linear-gradient(to bottom, rgba(255, 215, 0, 0.15) 0%, rgba(255, 255, 255, 0) 100%);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      z-index: 0;
      pointer-events: none;
      filter: blur(25px);
      transform-origin: top center;
      animation: sweep 12s infinite alternate ease-in-out;
    }
    body::before { left: 5%; transform: rotate(30deg); }
    body::after { right: 5%; transform: rotate(-30deg); animation-delay: -6s; }

    @keyframes sweep {
      0% { transform: rotate(25deg); opacity: 0.5; }
      50% { opacity: 1; }
      100% { transform: rotate(-25deg); opacity: 0.5; }
    }

    /* ====== HEADER INSEGNA ARISTON ====== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      /* Sfondo con fiori e overlay scuro per garantire la leggibilità di loghi e orologio */
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(11, 19, 43, 0.85)), url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=2000&q=80');
      background-size: cover;
      background-position: center;
      padding: 0 40px;
      /* Effetto "lampadine" dell'insegna teatrale */
      border-bottom: 8px dotted var(--sanremo-gold);
      box-shadow: 0 15px 50px rgba(255, 215, 0, 0.2);
      height: var(--header-height);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
    }
    header img {
      height: 85%; 
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0px 0px 15px rgba(255, 215, 0, 0.4));
    }

    .datetime { text-align: right; line-height: 1; position: relative; z-index: 2; }
    
    .datetime .time { 
        font-weight: 700; 
        font-size: 115px; 
        letter-spacing: -3px; 
        color: #fff; 
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px var(--sanremo-gold);
    }
    
    .datetime .date { 
        font-weight: 600; 
        font-size: 40px; 
        color: var(--sanremo-gold); 
        text-transform: uppercase; 
        letter-spacing: 2px;
        margin-top: 10px;
    }

    /* ====== CONTENUTO ====== */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin-top: var(--header-height);
      margin-bottom: var(--footer-height);
      overflow-y: hidden;
      position: relative;
      z-index: 10;
    }
    #courses {
      width: 100%;
      max-width: 1700px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 30px; 
    }

    /* ====== CORSI (Grafiche "Cantanti in Gara") ====== */
    .course {
      display: flex;
      border-radius: 20px; 
      overflow: hidden;
      /* Sfondo scuro elegante */
      background-color: rgba(5, 10, 25, 0.85); 
      border: 2px solid rgba(255, 215, 0, 0.3);
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      width: 100%;
      position: relative;
      transition: all 0.3s ease;
    }
    .course > div {
      padding: 25px 35px; 
      display: flex;
      align-items: center;
    }
    .course .attivita {
      flex: 2;
      font-size: 65px; 
      font-weight: 700;
      color: white; 
      text-shadow: 2px 2px 0px #000, 0 0 15px rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
    }
    .course .dettagli {
      flex: 1.2;
      display: flex;
      justify-content: space-around;
      background-color: rgba(0,0,0,0.4);
      border-left: 2px solid rgba(255, 215, 0, 0.2);
    }
    .info-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .info-label { font-size: 20px; text-transform: uppercase; color: #aaa; font-weight: 600; margin-bottom: 5px; letter-spacing: 2px;}
    .info-time { font-size: 65px; font-weight: 700; color: var(--sanremo-gold); line-height: 1; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);}

    /* STATI DEI CORSI ESTREMI */
    
    /* GREEN -> SOTTO I RIFLETTORI (Oro brillante) */
    .green  { 
        background: linear-gradient(90deg, rgba(255, 215, 0, 0.15) 0%, rgba(5, 10, 25, 0.9) 30%);
        border-left: 25px solid var(--sanremo-gold); 
        border-color: var(--sanremo-gold);
        box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), inset 0 0 20px rgba(255, 215, 0, 0.1);
    }
    
    /* YELLOW -> DIETRO LE QUINTE (Rosso lampeggiante intenso) */
    .yellow { 
        background: linear-gradient(90deg, rgba(230, 0, 0, 0.15) 0%, rgba(5, 10, 25, 0.9) 30%);
        border-left: 25px solid var(--sanremo-red); 
        animation: extreme-pulse 1.5s infinite; 
    }
    
    /* GRAY -> IN ATTESA (Trasparente ed elegante) */
    .gray   { 
        border-left: 25px solid #4A5568; 
    }
    .gray .attivita { color: #ccc; text-shadow: none; }
    .gray .info-time { color: #fff; text-shadow: none; }
    
    @keyframes extreme-pulse {
      0% { border-left-color: var(--sanremo-red); box-shadow: 0 0 10px rgba(230, 0, 0, 0.2); border-color: rgba(255, 215, 0, 0.3); }
      50% { border-left-color: #FF1A1A; box-shadow: 0 0 40px rgba(230, 0, 0, 0.8), inset 0 0 20px rgba(230, 0, 0, 0.3); border-color: rgba(230, 0, 0, 0.5); }
      100% { border-left-color: var(--sanremo-red); box-shadow: 0 0 10px rgba(230, 0, 0, 0.2); border-color: rgba(255, 215, 0, 0.3); }
    }

    /* Messaggio vuoto */
    .empty-message {
      text-align: center;
      font-size: 55px;
      font-weight: 700;
      color: var(--sanremo-gold);
      background: rgba(5, 10, 25, 0.9);
      padding: 80px;
      border-radius: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 50px rgba(255, 215, 0, 0.2);
      border: 3px solid var(--sanremo-gold);
      backdrop-filter: blur(10px);
      text-transform: uppercase;
    }
    .empty-message::before {
        content: '🏆';
        display: block;
        font-size: 90px;
        margin-bottom: 20px;
        filter: drop-shadow(0 0 20px var(--sanremo-gold));
    }

    /* ====== FOOTER RED CARPET ESTREMO ====== */
    footer {
      background: linear-gradient(180deg, #CC0000 0%, #800000 100%);
      border-top: 6px solid #FFD700;
      color: white;
      height: var(--footer-height);
      overflow: hidden;
      display: flex;
      align-items: center;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      box-shadow: 0 -10px 40px rgba(230, 0, 0, 0.4);
    }
    
    /* Effetto riflesso sul tappeto rosso */
    footer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 30%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
        z-index: 1;
    }

    .ticker {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      white-space: nowrap;
      display: flex;
      align-items: center;
      z-index: 2;
    }
    .ticker__track {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      animation: ticker var(--ticker-duration, 20s) linear infinite;
    }
    .ticker__content {
      display: inline-block;
      padding-right: 100px;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
      line-height: var(--footer-height);
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <!-- IL TUO HTML INIZIALE - NON MODIFICATO -->
  <header>
    <img src="CF Lampugnano blu xl.png" alt="Logo Piscina" onerror="this.style.display='none'; document.write('<h2 style=\'color: var(--sanremo-gold)\'>Piscina Lampugnano</h2>')"/>
    <div class="datetime">
      <div class="time" id="clock">--:--</div>
      <div class="date" id="date">--</div>
    </div>
  </header>

  <div class="container">
    <div id="courses">
        <div class="empty-message">Caricamento in corso...</div>
    </div>
  </div>

  <footer>
    <div class="ticker" id="ticker">
      <div class="ticker__track" id="ticker-track">
        <span class="ticker__content" id="ticker-copy-1">...</span>
        <span class="ticker__content" id="ticker-copy-2">...</span>
      </div>
    </div>
  </footer>

  <!-- IL TUO JAVASCRIPT INIZIALE - NON MODIFICATO -->
  <script>
    /* ====== OROLOGIO ====== */
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      
      const options = { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' };
      const dateStr = now.toLocaleDateString('it-IT', options); 
      
      document.getElementById("clock").textContent = `${h}:${m}`;
      document.getElementById("date").textContent  = dateStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ====== UTILS ====== */
    function normalizeStr(str) {
      if (!str) return "";
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
    }

    function parseTime(t) {
      if (!t || typeof t !== 'string' || !t.includes(':')) return NaN;
      const [h, m] = t.split(":").map(Number);
      return (h * 60) + m;
    }

    function formatCell(cell) {
      if (!cell) return "";
      if (cell.f) return cell.f;
      if (typeof cell.v === 'string') return cell.v;
      if (typeof cell.v === 'number') return cell.v.toString();
      return "";
    }

    /* ====== CARICAMENTO DATI ====== */
    async function loadAll() {
      const SHEET_ID = '1dcs1X7x84g69f14m9Sl2KmqZUbCI6lLBBfi3QCMNqWI';
      const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=`;
      
      try {
        /* ---- FETCH CORSI ---- */
        const resC = await fetch(SHEET_BASE + 'Corsi');
        if (!resC.ok) throw new Error("Network response was not ok");
        const txtC = await resC.text();
        const jsonC = JSON.parse(txtC.substring(47).slice(0, -2));
        const rowsC = jsonC.table.rows.map(r => r.c.map(c => c ? formatCell(c) : ""));

        const now = new Date();
        const currentTime = now.getHours() * 60 + now.getMinutes();
        const todayName = normalizeStr(now.toLocaleDateString('it-IT', { weekday: 'long' }));

        let parsed = rowsC
          .filter(r => normalizeStr(r[0]) === todayName)
          .map(r => {
            const ingressoMin = parseTime(r[2]);
            const inizioMin   = parseTime(r[3]);
            const durata      = Number.parseInt(r[4]) || 60;
            return {
              attivita: r[1] || '',
              oraIngresso: r[2] || '',
              oraInizio: r[3] || '',
              durata,
              ingressoMin,
              inizioMin
            };
          })
          .filter(c => Number.isFinite(c.ingressoMin) && currentTime <= (c.ingressoMin + c.durata))
          .sort((a, b) => a.ingressoMin - b.ingressoMin);

        renderCourses(parsed, currentTime);

        /* ---- FETCH NOTE ---- */
        const resN = await fetch(SHEET_BASE + 'Note');
        const txtN = await resN.text();
        const jsonN = JSON.parse(txtN.substring(47).slice(0, -2));
        const rowsN = jsonN.table.rows.map(r => r.c.map(c => c ? formatCell(c) : ""));
        const notesText = rowsN
          .filter(r => r[0] && r[0].trim() !== '')
          .map(r => r[0])
          .join("  •  ");

        updateTicker(notesText || 'Benvenuti alla Piscina Lampugnano - Serata Finale Sanremo');

      } catch (err) {
        console.error('Errore update:', err);
        const box = document.getElementById('courses');
        if (!box.children.length || box.innerText.includes('Caricamento')) {
           box.innerHTML = `<div class="empty-message">⚠️ Riconnessione in corso...</div>`;
        }
      }
    }

    function renderCourses(courses, currentTime) {
        const coursesBox = document.getElementById('courses');
        let htmlContent = '';

        if (courses.length === 0) {
           htmlContent = `
            <div class="empty-message">
              🏊‍♂️ IL FESTIVAL DI OGGI È TERMINATO!<br>
              <span style="font-size:35px; color:#ccc; display:block; margin-top:15px;">A domani per la prossima serata!</span>
            </div>`;
        } else {
          const visible = courses.slice(0, 4); 
          
          visible.forEach(corso => {
            const timeToStart = corso.ingressoMin - currentTime;
            
            let style = 'gray'; 
            if (timeToStart <= 0 && timeToStart > -corso.durata) {
                style = 'green'; 
            } else if (timeToStart <= 5 && timeToStart > 0) {
                style = 'yellow';
            }

            htmlContent += `
              <div class="course ${style}">
                <div class="attivita">${corso.attivita}</div>
                <div class="dettagli">
                    <div class="info-box">
                        <span class="info-label">Ingresso</span>
                        <span class="info-time">${corso.oraIngresso}</span>
                    </div>
                    <div class="info-box">
                        <span class="info-label">Inizio</span>
                        <span class="info-time">${corso.oraInizio}</span>
                    </div>
                </div>
              </div>
            `;
          });
        }
        coursesBox.innerHTML = htmlContent;
    }

    function updateTicker(text) {
        const copy1 = document.getElementById('ticker-copy-1');
        const copy2 = document.getElementById('ticker-copy-2');
        const track = document.getElementById('ticker-track');
        
        if (copy1.textContent === text) return;

        copy1.textContent = text;
        copy2.textContent = text;

        requestAnimationFrame(() => {
            const width = copy1.offsetWidth;
            const speed = 200; 
            const duration = width / speed; 
            track.style.setProperty('--ticker-duration', `${duration}s`);
        });
    }

    loadAll();
    setInterval(loadAll, 30000); 
  </script>
</body>
</html>
